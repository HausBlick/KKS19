function ab(b64){var s=atob(b64),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a.buffer}
async function dec(keyRaw){
  var key=await crypto.subtle.importKey("raw",keyRaw,"AES-GCM",false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:ab(IV)},key,ab(CT));
  var doc=new DOMParser().parseFromString(new TextDecoder().decode(pt),"text/html");
  document.replaceChild(document.adoptNode(doc.documentElement),document.documentElement);
  document.querySelectorAll("script").forEach(function(o){var s=document.createElement("script");s.textContent=o.textContent;o.replaceWith(s);});
}
async function go(){
  try{
    var pw=document.getElementById("pw").value;
    var base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
    var bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:ab(SALT),iterations:600000,hash:"SHA-256"},base,256);
    if(document.getElementById("rem").checked) localStorage.setItem("kks19k",btoa(String.fromCharCode.apply(null,new Uint8Array(bits))));
    await dec(bits);
  }catch(e){document.getElementById("err").style.display="block"}
}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")go()});
(async function(){var k=localStorage.getItem("kks19k");if(k){try{await dec(ab(k))}catch(e){localStorage.removeItem("kks19k")}}})();
</script></body></html>
